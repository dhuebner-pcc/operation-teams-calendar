
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Teams Calendars</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pc-dark:#2d5a2d;--pc-light:#e8f2e8;--pc-sage:#8fba6a;--pc-border:#d0e4d0;--pc-text:#1a3a1a;--bg:#f0f4f0;--surface:#fff;--surface2:#f5f8f5;--text-primary:#1a3a1a;--text-secondary:#4a6a4a;--text-muted:#a0b8a0}
body{font-family:Segoe UI,sans-serif;background:var(--bg);color:var(--text-primary);font-size:13px}

.app{max-width:1400px;margin:0 auto}
.header{background:var(--pc-dark);padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;position:sticky;top:0;z-index:50}
.toolbar{display:flex;align-items:center;gap:8px;margin:0 10px 6px;flex-wrap:wrap;position:sticky;top:47px;z-index:49;background:#f0f4f0;padding:4px 0}
.btn{padding:4px 12px;border:1px solid var(--pc-border);background:#fff;border-radius:3px;cursor:pointer;font-size:12px;color:var(--pc-text);line-height:1.4}
.btn:hover{background:var(--pc-light)}
.btn.active{background:var(--pc-dark);color:#fff;border-color:var(--pc-dark)}
.btn.nav{padding:4px 10px;font-size:14px}
.btn-labeled{display:flex;flex-direction:column;align-items:center;padding:3px 12px}
.btn-labeled .btn-main{font-size:12px;font-weight:500}
.btn-labeled .btn-sub{font-size:9px;opacity:0.75;letter-spacing:0.03em}
.sep{width:1px;height:28px;background:var(--pc-border)}
.legend{display:flex;gap:8px;flex-wrap:wrap;background:#fff;padding:8px 14px;border-radius:4px;border:1px solid var(--pc-border);margin:0 10px 10px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#4a6a4a}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cal-wrap{background:#fff;border-radius:4px;border:1px solid var(--pc-border);overflow:hidden;margin:0 10px}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--pc-border);background:var(--pc-light)}
.dow-cell{text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:var(--pc-dark);text-transform:uppercase;letter-spacing:.04em}
.week{border-bottom:1px solid var(--pc-border)}
.week:last-child{border-bottom:none}
.day-nums{display:grid;grid-template-columns:repeat(7,1fr)}
.dn{padding:3px 5px;font-size:11px;color:#4a6a4a;border-right:1px solid var(--pc-border);min-height:20px}
.dn:last-child{border-right:none}
.dn.today{color:#fff;font-weight:700;background:var(--pc-dark);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:1px 4px}
.dn.month-start,.dn.month-start.other,.dn.month-start.wknd{color:#fff;font-weight:700;background:#0078d4;border-radius:10px;padding:1px 6px;display:inline-flex;align-items:center;gap:3px;margin:1px 3px}
.dn.other{color:#a0b8a0}
.dn.wknd{background:#f5f8f5}
.entries-grid{display:grid;grid-template-columns:repeat(7,1fr);position:relative}
.day-col{border-right:1px solid var(--pc-border);min-height:24px}
.day-col:last-child{border-right:none}
.day-col.wknd{background:#f5f8f5}
.day-col.today-col{background:#e8f5e8}
.day-col.other-col{background:#f5f8f5}
.spans{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;gap:1px;padding:2px 0;pointer-events:none}
.span-row{display:grid;grid-template-columns:repeat(7,1fr);height:18px}
.bar{height:16px;border-radius:2px;font-size:10px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 5px;line-height:16px;cursor:pointer;pointer-events:all;margin:0 1px;border-left:3px solid transparent}
.bar:hover{opacity:.85}
.tooltip{position:fixed;background:#fff;border:1px solid var(--pc-border);border-radius:4px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:999;display:none;box-shadow:0 2px 8px rgba(0,0,0,.12);max-width:240px;line-height:1.6}
.month-lbl{font-size:13px;font-weight:600;min-width:200px;text-align:center;color:var(--pc-dark)}
.view-toggle{display:flex}
.view-toggle .btn:first-child{border-radius:3px 0 0 3px;border-right:none}
.view-toggle .btn:last-child{border-radius:0 3px 3px 0}
.gantt-wrap{background:#fff;border-radius:4px;border:1px solid var(--pc-border);overflow-x:auto;margin:0 10px}
.gantt-table{width:100%;border-collapse:collapse;min-width:900px}
.gantt-table th{font-size:10px;font-weight:600;color:var(--pc-dark);text-align:center;padding:4px 2px;border-bottom:1px solid var(--pc-border);border-right:1px solid var(--pc-border);text-transform:uppercase;background:var(--pc-light)}
.gantt-table th:first-child{text-align:left;padding-left:8px}
.gantt-table td{border-bottom:1px solid var(--pc-border);border-right:1px solid var(--pc-border);padding:1px 2px;vertical-align:middle}
.gantt-table td.name-col{padding:3px 8px;font-size:11px;font-weight:500;white-space:nowrap;min-width:100px;cursor:pointer}
.gantt-table td.name-col:hover{background:var(--pc-light)}
.gantt-table td.name-col.selected{background:var(--pc-light);font-weight:700}
.gantt-table td.day-td{width:28px;min-width:28px;height:22px;text-align:center}
.gantt-table td.wknd-td{background:#f5f8f5}
.gantt-table td.today-td{background:#e8f5e8}
.gantt-table td.dimmed{opacity:0.15}
.gantt-bar-g{display:block;width:100%;height:16px;border-radius:2px;font-size:9px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 3px;line-height:16px;cursor:pointer}
.group-hdr td{background:var(--pc-dark);color:#fff;font-size:10px;font-weight:600;padding:4px 8px;text-transform:uppercase;letter-spacing:.06em}
.summary-bar{display:flex;gap:12px;background:#fff;padding:8px 14px;border-radius:4px;border:1px solid var(--pc-border);margin:0 10px 10px;flex-wrap:wrap;align-items:center}
.sum-item{font-size:12px;color:#4a6a4a}
.sum-item strong{color:var(--pc-dark);font-weight:600}
.last-sync{font-size:11px;color:rgba(255,255,255,0.6);margin-left:auto}
.error{text-align:center;padding:40px;color:#c00000;font-size:13px}
.cap-wrap{margin:0 10px}
.cap-section{background:#fff;border:1px solid var(--pc-border);border-radius:4px;margin-bottom:10px;overflow:hidden}
.cap-hdr{background:var(--pc-dark);color:#fff;padding:8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.cap-table{width:100%;border-collapse:collapse}
.cap-table th{background:var(--pc-light);color:var(--pc-dark);font-size:11px;font-weight:600;padding:6px 12px;border-bottom:1px solid var(--pc-border);border-right:1px solid var(--pc-border);text-align:right}
.cap-table th:first-child{text-align:left}
.cap-table td{padding:5px 12px;border-bottom:1px solid var(--pc-border);border-right:1px solid var(--pc-border);font-size:12px;text-align:right}
.cap-table td:first-child{text-align:left;font-weight:500}
.cap-table tr:last-child td{border-bottom:none}
.cap-table tr.total-row td{background:var(--pc-light);font-weight:600;color:var(--pc-dark)}
.person-note{font-size:11px;color:#4a6a4a;font-style:italic;margin:0 10px 6px}
.lst-wrap{margin:0 10px}
.lst-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;background:#fff;padding:8px 12px;border-radius:4px;border:1px solid var(--pc-border)}
.lst-search{padding:4px 8px;border:1px solid var(--pc-border);border-radius:3px;font-size:12px;min-width:220px}
.lst-count{font-size:11px;color:#4a6a4a;margin-left:auto}
.lst-table-wrap{background:#fff;border-radius:4px;border:1px solid var(--pc-border);overflow-x:auto}
.lst-table{width:100%;border-collapse:collapse;min-width:700px}
.lst-table th{background:var(--pc-light);color:var(--pc-dark);font-size:11px;font-weight:600;padding:0;border-bottom:1px solid var(--pc-border);border-right:1px solid var(--pc-border);white-space:nowrap;position:relative;user-select:none}
.lst-th-inner{display:flex;align-items:center;gap:4px;padding:6px 10px;cursor:pointer}
.lst-th-inner:hover{background:var(--pc-border)}
.lst-sort-btn{font-size:10px;opacity:0.5}
.lst-filter-btn{padding:2px 4px;font-size:10px;background:transparent;border:none;cursor:pointer;color:var(--pc-dark);opacity:0.6;flex-shrink:0}
.lst-filter-btn:hover{opacity:1}
.lst-filter-btn.active{opacity:1;color:#0078d4}
.lst-dropdown{position:absolute;top:100%;left:0;background:#fff;border:1px solid var(--pc-border);border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:100;min-width:160px;max-height:250px;overflow-y:auto;padding:4px 0}
.lst-dropdown label{display:flex;align-items:center;gap:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:#1a3a1a}
.lst-dropdown label:hover{background:var(--pc-light)}
.lst-dropdown .dd-actions{display:flex;gap:4px;padding:4px 10px;border-top:1px solid var(--pc-border);margin-top:2px}
.lst-dropdown .dd-actions button{font-size:11px;padding:2px 6px;border:1px solid var(--pc-border);border-radius:2px;cursor:pointer;background:#fff;color:var(--pc-dark)}
.lst-table td{padding:5px 10px;border-bottom:1px solid var(--pc-border);border-right:1px solid var(--pc-border);font-size:12px;white-space:nowrap}
.lst-table tr:last-child td{border-bottom:none}
.lst-table tr:hover td{background:#f9fbf9}
.lst-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.lst-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <span style="color:#8fba6a;font-size:18px;font-weight:600;letter-spacing:0.02em">Operations Teams Calendars</span>
  <span class="last-sync" id="last-sync"></span>
</div>
<div class="toolbar">
  <div class="view-toggle">
    <button class="btn active" id="btn-cal" onclick="setView('cal')">Wall Calendar</button>
    <button class="btn" id="btn-res" onclick="setView('res')">Resource View</button>
    <button class="btn" id="btn-cap" onclick="setView('cap')">Capacity</button>
    <button class="btn" id="btn-lst" onclick="setView('lst')">List View</button>
  </div>
  <div class="sep"></div>
  <button class="btn btn-labeled active" id="f-all" onclick="setFilter('all')"><span class="btn-main">All</span><span class="btn-sub">Teams</span></button>
  <button class="btn btn-labeled" id="f-geek" onclick="setFilter('geek')"><span class="btn-main">Geek</span><span class="btn-sub">Physical Security</span></button>
  <button class="btn btn-labeled" id="f-green" onclick="setFilter('green')"><span class="btn-main">Green</span><span class="btn-sub">Infrastructure</span></button>
  <button class="btn btn-labeled" id="f-panda" onclick="setFilter('panda')"><span class="btn-main">Panda</span><span class="btn-sub">Service</span></button>
  <div class="sep"></div>
  <button class="btn nav" onclick="shiftMonth(-1)" title="Previous month">&#171;</button>
  <button class="btn nav" onclick="shiftWeek(-1)" title="Previous week">&#8592;</button>
  <span class="month-lbl" id="month-lbl"></span>
  <button class="btn nav" onclick="shiftWeek(1)" title="Next week">&#8594;</button>
  <button class="btn nav" onclick="shiftMonth(1)" title="Next month">&#187;</button>
  <button class="btn" onclick="goToday()">Today</button>
  <div class="sep"></div>
  <button class="btn" onclick="loadData()">&#8635; Refresh</button>
</div>
<div class="summary-bar" id="summary-bar"><span style="color:#4a6a4a;font-size:12px">Loading...</span></div>
<div class="legend" id="legend"></div>
<div id="person-note" class="person-note" style="display:none">Click a person to filter. Click multiple to stack. Click again to deselect.</div>
<div id="cal-view"></div>
<div id="res-view" style="display:none"></div>
<div id="cap-view" style="display:none"></div>
<div id="lst-view" style="display:none"></div>
</div>
<div class="tooltip" id="tt"></div>

<script>
const DATA_URL='https://dhuebner-pcc.github.io/operation-teams-calendar/calendar-data.json';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const PEOPLE={};
const CORE_TEAMS={
  management:[],geek:[],green:[],panda:[],needstaff:['TBD','TBD 1','TBD 2','TBD 3','TBD 4','TBD 5','TBD 6'],other:[],
};
const TEAM_LABELS={
  management:'Management',
  geek:'Geek — Physical Security',
  green:'Green — Infrastructure',
  panda:'Panda — Service',
  needstaff:'Need Staff — TBD',
  other:'Other / Temporary',
};
const TBD_COLOR={bg:'#c8a870',border:'#7a5a10',text:'#3a2000'};
const DEFAULT_P={bg:'#d0d0d0',border:'#808080',text:'#303030',team:'other'};

let RAW=[];
let activeView='cal';
let activeFilters=new Set(['all']);
let selectedPeople=new Set();
const today=new Date();today.setHours(0,0,0,0);
let viewStart=new Date(today);
viewStart.setDate(today.getDate()-today.getDay());
let curY=viewStart.getFullYear(),curM=viewStart.getMonth();

function hexToLight(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lr=Math.round(r+(255-r)*0.75),lg=Math.round(g+(255-g)*0.75),lb=Math.round(b+(255-b)*0.75);
  return '#'+[lr,lg,lb].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function hexToDark(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const dr=Math.round(r*0.35),dg=Math.round(g*0.35),db=Math.round(b*0.35);
  return '#'+[dr,dg,db].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function personColor(name,type){
  if(!name||name.toUpperCase().startsWith('TBD')||type==='tbd') return TBD_COLOR;
  return PEOPLE[name]||DEFAULT_P;
}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function updateLabel(){
  if(activeView==='cal'){
    document.getElementById('month-lbl').textContent='Rolling 34-week view';
    return;
  }
  const e=new Date(viewStart);e.setDate(viewStart.getDate()+34);
  const s=viewStart;
  let lbl=MONTHS_SHORT[s.getMonth()]+' '+s.getDate();
  if(s.getFullYear()!==e.getFullYear()) lbl+=' '+s.getFullYear();
  lbl+=' – '+MONTHS_SHORT[e.getMonth()]+' '+e.getDate()+' '+e.getFullYear();
  document.getElementById('month-lbl').textContent=lbl;
}

function shiftWeek(d){
  if(activeView==='cal'){
    const weekH=document.querySelector('.week');
    const h=weekH?weekH.offsetHeight:120;
    window.scrollBy({top:d*h,behavior:'smooth'});
    return;
  }
  viewStart=new Date(viewStart);
  viewStart.setDate(viewStart.getDate()+d*7);
  curY=viewStart.getFullYear();curM=viewStart.getMonth();
  updateLabel();render();
}
function shiftMonth(d){
  if(activeView==='cal'){
    const weekH=document.querySelector('.week');
    const h=weekH?weekH.offsetHeight:120;
    window.scrollBy({top:d*4*h,behavior:'smooth'});
    return;
  }
  curM+=d;
  if(curM>11){curM=0;curY++;}
  if(curM<0){curM=11;curY--;}
  viewStart=new Date(curY,curM,1);
  viewStart.setDate(viewStart.getDate()-viewStart.getDay());
  updateLabel();render();
}
function goToday(){
  if(activeView==='cal'){
    const todayCell=document.querySelector('.dn.today');
    if(todayCell) todayCell.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  viewStart=new Date(today);
  viewStart.setDate(today.getDate()-today.getDay());
  curY=today.getFullYear();curM=today.getMonth();
  updateLabel();render();
}
function setFilter(f){
  if(f==='all'){activeFilters=new Set(['all']);}
  else{
    activeFilters.delete('all');
    if(activeFilters.has(f))activeFilters.delete(f);
    else activeFilters.add(f);
    if(activeFilters.size===0)activeFilters=new Set(['all']);
  }
  ['all','geek','green','panda'].forEach(x=>document.getElementById('f-'+x).classList.toggle('active',activeFilters.has(x)));
  render();
}
function setView(v){
  activeView=v;
  ['cal','res','cap','lst'].forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('active',v===x);
    document.getElementById(x+'-view').style.display=v===x?'':'none';
  });
  document.getElementById('person-note').style.display=v==='res'?'block':'none';
  if(v==='lst') document.getElementById('lst-view').innerHTML='';
  render();
}
function filteredEntries(){
  if(activeFilters.has('all')) return RAW;
  return RAW.filter(e=>activeFilters.has(e.cal));
}

async function loadData(){
  document.getElementById('last-sync').textContent='Refreshing...';
  try{
    const res=await fetch(DATA_URL+'?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();

    Object.keys(PEOPLE).forEach(k=>delete PEOPLE[k]);
    Object.keys(CORE_TEAMS).forEach(k=>{
      if(!['needstaff'].includes(k)) CORE_TEAMS[k]=[];
    });
    (data.members||[]).forEach(m=>{
      const active=typeof m.Active==='object'?m.Active&&m.Active.Value:m.Active;
      if(active==='No'||active===false) return;
      const name=(m.PersonName||m.Title||'').trim();
      const team=(typeof m.Team==='object'?m.Team&&m.Team.Value:m.Team||'other').toLowerCase().trim();
      const hex=(m.Color||'#808080').trim();
      const targetDays=typeof m.TargetDays==='number'?m.TargetDays:0;
      if(!name) return;
      const bg=hexToLight(hex);
      PEOPLE[name]={bg,border:hex,text:hexToDark(hex),team,targetDays};
      if(CORE_TEAMS[team]) CORE_TEAMS[team].push(name);
      else CORE_TEAMS['other'].push(name);
    });

    RAW=(data.events||[]).map(item=>{
      const title=(item.Title||'').trim();
      let person='',displayLabel=title;
      if(title.includes(' - ')){
        const parts=title.split(' - ');
        person=parts[0].trim();
        displayLabel=parts.slice(1).join(' - ');
      } else if(title.includes('-')){
        const p=title.split('-')[0].trim();
        if(PEOPLE[p]){
          person=p;
          displayLabel=title.split('-').slice(1).join('-').trim();
        } else {
          displayLabel=title;
        }
      } else {
        const firstWord=title.split(' ')[0].trim();
        if(PEOPLE[firstWord]){
          person=firstWord;
          displayLabel=title.split(' ').slice(1).join(' ').trim()||title;
        } else {
          displayLabel=title;
        }
      }
      if(!displayLabel) displayLabel=title;
      if(!person) displayLabel=title;
      const et=item.EntryType,cal=item.Calendar;
      // Auto-detect type from title if stored as 'project'
      let type=(typeof et==='object'?et&&et.Value:et||'project').toLowerCase().trim();
      if(type==='project'){
        const tl=title.toLowerCase();
        if(tl.includes('travel')) type='travel';
        else if(tl.includes(' out')||tl.includes('-out')||tl.includes('off')||tl.includes('pto')) type='off';
        else if(tl.includes('remote')) type='remote';
        else if(title.toUpperCase().startsWith('TBD')) type='tbd';
      }
      const calVal=(typeof cal==='object'?cal&&cal.Value:cal||'').toLowerCase().trim();
      return{person,label:displayLabel,fulltitle:title,type,
        start:(item.StartDate||'').substring(0,10),
        end:(item.EndDate||'').substring(0,10),cal:calVal};
    }).filter(e=>e.start&&e.end);

    document.getElementById('last-sync').textContent='Last synced: '+new Date().toLocaleTimeString();
    viewStart=new Date(today);
    viewStart.setDate(today.getDate()-today.getDay());
    curY=viewStart.getFullYear();curM=viewStart.getMonth();
    updateLabel();render();
    // Scroll to today on wall calendar
    setTimeout(()=>{
      const todayCell=document.querySelector('.dn.today');
      if(todayCell) todayCell.scrollIntoView({behavior:'smooth',block:'center'});
    },100);
  }catch(err){
    document.getElementById('last-sync').textContent='Sync failed';
    document.getElementById('cal-view').innerHTML='<div class="error">Error: '+err.message+'</div>';
  }
}

function renderSummary(entries){
  const tbds=entries.filter(e=>e.person.toUpperCase().startsWith('TBD')).length;
  document.getElementById('summary-bar').innerHTML=tbds>0
    ?'<div class="sum-item" style="color:#7a5a10">TBD slots: <strong>'+tbds+'</strong> — need staffing</div>'
    :'<div class="sum-item">No TBD slots — all positions staffed</div>';
}
function renderLegend(){
  const leg=document.getElementById('legend');leg.innerHTML='';
  Object.entries(PEOPLE).forEach(([name,p])=>{
    if(!activeFilters.has('all')&&!activeFilters.has(p.team)&&p.team!=='management'&&p.team!=='other') return;
    const d=document.createElement('div');d.className='leg';
    d.innerHTML='<span class="leg-dot" style="background:'+p.border+'"></span>'+name;
    leg.appendChild(d);
  });
  const tbd=document.createElement('div');tbd.className='leg';
  tbd.innerHTML='<span class="leg-dot" style="background:#7a5a10"></span>TBD — unstaffed';
  leg.appendChild(tbd);
}

function renderCal(){
  const entries=filteredEntries();
  renderSummary(entries);renderLegend();
  const wrap=document.getElementById('cal-view');wrap.innerHTML='';
  const cw=document.createElement('div');cw.className='cal-wrap';
  const dowHdr=document.createElement('div');dowHdr.className='dow-hdr';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{
    const c=document.createElement('div');c.className='dow-cell';c.textContent=d;dowHdr.appendChild(c);
  });
  cw.appendChild(dowHdr);

  // Rolling window: 8 weeks back, 26 weeks forward = 34 weeks total
  let ws=new Date(today);
  ws.setDate(today.getDate()-today.getDay()-(8*7));
  const totalWeeks=34;
  for(let w=0;w<totalWeeks;w++){
    const days=[];
    for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
    const week=document.createElement('div');week.className='week';
    const dnRow=document.createElement('div');dnRow.className='day-nums';
    days.forEach(d=>{
      const c=document.createElement('div');c.className='dn';
      if(d.getMonth()!==curM)c.classList.add('other');
      else if(dk(d)===dk(today))c.classList.add('today');
      if(d.getDay()===0||d.getDay()===6)c.classList.add('wknd');
      c.textContent=d.getDate();
      if(d.getDate()===1){
        c.classList.add('month-start');
        const ml=document.createElement('span');
        ml.style.cssText='font-size:9px;color:rgba(255,255,255,0.85);font-weight:600;margin-left:2px';
        ml.textContent=MONTHS_SHORT[d.getMonth()];
        c.appendChild(ml);
      }
      dnRow.appendChild(c);
    });
    week.appendChild(dnRow);
    const eg=document.createElement('div');eg.className='entries-grid';
    days.forEach(d=>{
      const col=document.createElement('div');col.className='day-col';
      if(dk(d)===dk(today))col.classList.add('today-col');
      else if(d.getDay()===0||d.getDay()===6)col.classList.add('wknd');
      else if(d.getMonth()!==curM)col.classList.add('other-col');
      eg.appendChild(col);
    });
    const weekEntries=entries.filter(e=>e.start&&e.end&&pd(e.start)<=days[6]&&pd(e.end)>=days[0]);
    const rows=[];
    weekEntries.forEach(e=>{
      const es=pd(e.start),ee=pd(e.end);
      const sc=es<days[0]?0:days.findIndex(d=>dk(d)===dk(es));
      const eiIdx=days.findIndex(d=>dk(d)===dk(ee));
      const startCol=sc<0?0:sc;
      const endCol=ee>days[6]?6:eiIdx===-1?6:eiIdx;
      let placed=false;
      for(let r=0;r<rows.length;r++){
        if(rows[r].every(x=>x.endCol<startCol||x.startCol>endCol)){rows[r].push({e,startCol,endCol});placed=true;break;}
      }
      if(!placed)rows.push([{e,startCol,endCol}]);
    });
    const minH=(rows.length*20+6)+'px';
    eg.querySelectorAll('.day-col').forEach(c=>c.style.minHeight=minH);
    const sl=document.createElement('div');sl.className='spans';
    rows.forEach(row=>{
      const sr=document.createElement('div');sr.className='span-row';
      const sorted=row.slice().sort((a,b)=>a.startCol-b.startCol);
      let col=0;
      sorted.forEach(({e,startCol,endCol})=>{
        while(col<startCol){sr.appendChild(document.createElement('div'));col++;}
        const c=personColor(e.person,e.type);
        const bar=document.createElement('div');
        bar.className='bar';
        bar.style.cssText='background:'+c.bg+';border-left-color:'+c.border+';color:'+c.text+';grid-column:'+(startCol+1)+'/span '+(endCol-startCol+1);
        bar.textContent=e.person?e.person+' \u2014 '+e.label:(e.label||e.fulltitle);
        bar.addEventListener('mouseenter',ev=>showTt(ev,e));
        bar.addEventListener('mouseleave',()=>{document.getElementById('tt').style.display='none';});
        sr.appendChild(bar);col=endCol+1;
      });
      sl.appendChild(sr);
    });
    eg.appendChild(sl);week.appendChild(eg);cw.appendChild(week);
    ws.setDate(ws.getDate()+7);
  }
  wrap.appendChild(cw);
}

function togglePerson(name){
  if(selectedPeople.has(name))selectedPeople.delete(name);
  else selectedPeople.add(name);
  renderRes();
}
function renderRes(){
  const entries=filteredEntries();
  const days=[];
  let ws=new Date(viewStart);
  for(let w=0;w<5;w++){
    for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
    ws.setDate(ws.getDate()+7);
  }
  const monthEntries=entries.filter(e=>e.start&&e.end&&pd(e.start)<=days[days.length-1]&&pd(e.end)>=days[0]);
  const dynamicPeople=new Set();
  monthEntries.forEach(e=>dynamicPeople.add(e.person));
  function getTeam(name){
    if(!name) return 'other';
    if(name.toUpperCase().startsWith('TBD')) return 'needstaff';
    for(const[t,m] of Object.entries(CORE_TEAMS)){if(m.includes(name))return t;}
    return 'other';
  }
  const wrap=document.getElementById('res-view');wrap.innerHTML='';
  const gw=document.createElement('div');gw.className='gantt-wrap';
  const tbl=document.createElement('table');tbl.className='gantt-table';
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  const nth=document.createElement('th');nth.textContent='Person';nth.style.textAlign='left';nth.style.minWidth='120px';hr.appendChild(nth);
  days.forEach(d=>{
    const th=document.createElement('th');
    if(dk(d)===dk(today)){
      th.style.color='#fff';
      th.style.background='var(--pc-dark)';
      th.style.borderRadius='50%';
    } else if(d.getDate()===1){
      th.style.color='#fff';
      th.style.background='#0078d4';
      th.style.borderRadius='4px';
      th.style.padding='2px 4px';
    } else {
      th.textContent=d.getDate();
    }
    if(!th.textContent) th.textContent=d.getDate();
    if(d.getDay()===0||d.getDay()===6)th.style.opacity='0.4';
    hr.appendChild(th);
  });
  thead.appendChild(hr);tbl.appendChild(thead);
  const tbody=document.createElement('tbody');
  ['management','geek','green','panda','needstaff','other'].forEach(teamKey=>{
    if(!activeFilters.has('all')&&!['management','needstaff','other'].includes(teamKey)&&!activeFilters.has(teamKey)) return;
    const core=CORE_TEAMS[teamKey]||[];
    const extra=[...dynamicPeople].filter(n=>getTeam(n)===teamKey&&!core.includes(n));
    const people=[...core,...extra];
    if(!people.length) return;
    const ghdr=document.createElement('tr');ghdr.className='group-hdr';
    const gtd=document.createElement('td');gtd.colSpan=days.length+1;gtd.textContent=TEAM_LABELS[teamKey]||teamKey;
    ghdr.appendChild(gtd);tbody.appendChild(ghdr);
    people.forEach(name=>{
      const isSelected=selectedPeople.has(name);
      const isDimmed=selectedPeople.size>0&&!isSelected;
      const tr=document.createElement('tr');
      const ntd=document.createElement('td');
      ntd.className='name-col'+(isSelected?' selected':'');
      const c=personColor(name,'project');
      ntd.innerHTML='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c.border+';margin-right:5px"></span>'+name;
      ntd.addEventListener('click',()=>togglePerson(name));
      tr.appendChild(ntd);
      days.forEach(d=>{
        const td=document.createElement('td');td.className='day-td';
        if(dk(d)===dk(today))td.classList.add('today-td');
        else if(d.getDay()===0||d.getDay()===6)td.classList.add('wknd-td');
        if(isDimmed)td.classList.add('dimmed');
        const dayEntries=monthEntries.filter(e=>e.person===name&&e.start&&e.end&&d>=pd(e.start)&&d<=pd(e.end));
        if(dayEntries.length){
          const e=dayEntries[0];
          const c=personColor(e.person,e.type);
          const bar=document.createElement('div');
          bar.className='gantt-bar-g';
          bar.style.cssText='background:'+c.bg+';color:'+c.text+';border-left:2px solid '+c.border;
          bar.addEventListener('mouseenter',ev=>showTt(ev,e));
          bar.addEventListener('mouseleave',()=>{document.getElementById('tt').style.display='none';});
          td.appendChild(bar);
          if(dayEntries.length>1)td.style.outline='2px solid #c00000';
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  });
  tbl.appendChild(tbody);gw.appendChild(tbl);wrap.appendChild(gw);
}

function renderCap(){
  const now=new Date();now.setHours(0,0,0,0);
  const yearStart=new Date(now.getFullYear(),0,1);
  const yearEnd=new Date(now.getFullYear(),11,31);

  function countDays(entries,start,end){
    let count=0;
    entries.forEach(e=>{
      if(!e.start||!e.end) return;
      const es=pd(e.start),ee=pd(e.end);
      let d=new Date(Math.max(es.getTime(),start.getTime()));
      const last=new Date(Math.min(ee.getTime(),end.getTime()));
      while(d<=last){count++;d=new Date(d.getTime()+86400000);}
    });
    return count;
  }

  function statusBadge(pct,hasTarget){
    if(!hasTarget) return '<span class="status-badge" style="background:#f0f0f0;color:#808080">No target</span>';
    if(pct>=100) return '<span class="status-badge" style="background:#fde8e8;color:#c00000">Over</span>';
    if(pct>=80) return '<span class="status-badge" style="background:#fff3cd;color:#856404">Near</span>';
    return '<span class="status-badge" style="background:#e8f5e8;color:#2d5a2d">OK</span>';
  }

  const wrap=document.getElementById('cap-view');wrap.innerHTML='';
  const cw=document.createElement('div');cw.className='cap-wrap';

  ['geek','green','panda'].forEach(teamKey=>{
    if(!activeFilters.has('all')&&!activeFilters.has(teamKey)) return;
    const members=CORE_TEAMS[teamKey]||[];
    if(!members.length) return;

    const teamLabel={geek:'Geek — Physical Security',green:'Green — Infrastructure',panda:'Panda — Service'}[teamKey];
    const section=document.createElement('div');section.className='cap-section';
    const hdr=document.createElement('div');hdr.className='cap-hdr';hdr.textContent=teamLabel;
    section.appendChild(hdr);

    const tbl=document.createElement('table');tbl.className='cap-table';
    const thead=document.createElement('thead');
    const hr=document.createElement('tr');
    ['Person','Target Days','Scheduled YTD','Scheduled Full Year','Remaining','Utilization','Status'].forEach(h=>{
      const th=document.createElement('th');th.textContent=h;hr.appendChild(th);
    });
    thead.appendChild(hr);tbl.appendChild(thead);

    const tbody=document.createElement('tbody');
    let totTarget=0,totSchedFull=0;

    members.forEach(name=>{
      const p=PEOPLE[name];if(!p) return;
      const target=p.targetDays||0;
      const pe=RAW.filter(e=>e.person===name);
      const schedYTD=countDays(pe,yearStart,now);
      const schedFull=countDays(pe,yearStart,yearEnd);
      const remaining=target>0?Math.max(0,target-schedFull):0;
      const pct=target>0?Math.round((schedFull/target)*100):0;
      totTarget+=target;totSchedFull+=schedFull;

      const tr=document.createElement('tr');
      const c=personColor(name,'project');
      const cells=[
        {html:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c.border+';margin-right:5px"></span>'+name,left:true},
        {text:target||'—'},
        {text:schedYTD},
        {text:schedFull},
        {text:target>0?remaining:'—'},
        {text:target>0?pct+'%':'—'},
        {html:statusBadge(pct,target>0)},
      ];
      cells.forEach(cell=>{
        const td=document.createElement('td');
        if(cell.html) td.innerHTML=cell.html;
        else td.textContent=cell.text;
        if(!cell.left) td.style.textAlign='right';
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    // Total row
    const totPct=totTarget>0?Math.round((totSchedFull/totTarget)*100):0;
    const tr=document.createElement('tr');tr.className='total-row';
    const cells=[
      {text:'Team Total',left:true},
      {text:totTarget||'—'},
      {text:'—'},
      {text:totSchedFull},
      {text:totTarget>0?Math.max(0,totTarget-totSchedFull):'—'},
      {text:totTarget>0?totPct+'%':'—'},
      {html:statusBadge(totPct,totTarget>0)},
    ];
    cells.forEach(cell=>{
      const td=document.createElement('td');
      if(cell.html) td.innerHTML=cell.html;
      else td.textContent=cell.text;
      if(!cell.left) td.style.textAlign='right';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
    tbl.appendChild(tbody);section.appendChild(tbl);cw.appendChild(section);
  });
  wrap.appendChild(cw);
}

function showTt(ev,e){
  const tt=document.getElementById('tt');tt.style.display='block';
  const c=personColor(e.person,e.type);
  const typeLabel={project:'Project',travel:'Travel day',off:'Off / PTO',remote:'Remote',tbd:'TBD — needs staffing'};
  tt.innerHTML='<div style="font-weight:600;color:'+c.border+'">'+e.person+'</div>'+
    '<div>'+e.label+'</div>'+
    '<div style="color:#605e5c;font-size:11px;margin-top:2px">'+e.start+' \u2192 '+e.end+'</div>'+
    '<span style="display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px;margin-top:3px;background:'+c.bg+';color:'+c.text+'">'+(typeLabel[e.type]||e.type)+'</span>';
  tt.style.left=(ev.clientX+14)+'px';tt.style.top=(ev.clientY-10)+'px';
}

function render(){
  if(activeView==='cal') renderCal();
  else if(activeView==='res') renderRes();
  else if(activeView==='cap') renderCap();
  else if(activeView==='lst') renderLst();
}

// List View
let lstSearch='';
let lstSortCol='start',lstSortDir='asc';
let lstColFilters={person:null,team:null,label:null,type:null,start:null,end:null,cal:null};
let lstOpenDropdown=null;

const LST_TYPE_LABEL={project:'Project',travel:'Travel',off:'Off/PTO',remote:'Remote',tbd:'TBD'};
const LST_TEAM_LABEL={management:'Management',geek:'Geek',green:'Green',panda:'Panda',other:'Other'};
const LST_TYPE_BG={project:'#e8f2e8',travel:'#e6f1fb',off:'#f0f0f0',remote:'#e0f0e0',tbd:'#f5e8d0'};

function lstGetRows(){
  return filteredEntries().map(e=>({
    ...e,
    team:PEOPLE[e.person]?PEOPLE[e.person].team:'other',
  }));
}

function lstApplyFilters(rows){
  let r=rows;
  if(lstSearch){
    const q=lstSearch.toLowerCase();
    r=r.filter(e=>(e.person+e.label+e.cal).toLowerCase().includes(q));
  }
  Object.entries(lstColFilters).forEach(([col,vals])=>{
    if(!vals||vals.size===0) return;
    r=r.filter(e=>{
      const v=col==='team'?LST_TEAM_LABEL[e.team]||e.team:
               col==='type'?LST_TYPE_LABEL[e.type]||e.type:
               (e[col]||'');
      return vals.has(v);
    });
  });
  r.sort((a,b)=>{
    const av=lstSortCol==='team'?(LST_TEAM_LABEL[a.team]||a.team):
             lstSortCol==='type'?(LST_TYPE_LABEL[a.type]||a.type):(a[lstSortCol]||'');
    const bv=lstSortCol==='team'?(LST_TEAM_LABEL[b.team]||b.team):
             lstSortCol==='type'?(LST_TYPE_LABEL[b.type]||b.type):(b[lstSortCol]||'');
    return lstSortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
  });
  return r;
}

function lstGetUniqueVals(rows,col){
  const vals=new Set();
  rows.forEach(e=>{
    const v=col==='team'?LST_TEAM_LABEL[e.team]||e.team:
             col==='type'?LST_TYPE_LABEL[e.type]||e.type:
             (e[col]||'');
    if(v) vals.add(v);
  });
  return [...vals].sort();
}

function lstCloseDropdown(){
  if(lstOpenDropdown){lstOpenDropdown.remove();lstOpenDropdown=null;}
}

function lstOpenFilter(col,btn,allRows){
  lstCloseDropdown();
  const dd=document.createElement('div');dd.className='lst-dropdown';
  const vals=lstGetUniqueVals(allRows,col);
  const active=lstColFilters[col];
  vals.forEach(v=>{
    const lbl=document.createElement('label');
    const cb=document.createElement('input');
    cb.type='checkbox';cb.value=v;
    cb.checked=!active||active.has(v);
    lbl.appendChild(cb);lbl.appendChild(document.createTextNode(' '+v));
    dd.appendChild(lbl);
  });
  const actions=document.createElement('div');actions.className='dd-actions';
  const allBtn=document.createElement('button');allBtn.textContent='All';
  allBtn.onclick=()=>{lstColFilters[col]=null;lstCloseDropdown();renderLst();};
  const applyBtn=document.createElement('button');applyBtn.textContent='Apply';applyBtn.style.background=getComputedStyle(document.documentElement).getPropertyValue('--pc-dark').trim();applyBtn.style.color='#fff';
  applyBtn.onclick=()=>{
    const checked=new Set([...dd.querySelectorAll('input:checked')].map(x=>x.value));
    lstColFilters[col]=checked.size===vals.length?null:checked;
    lstCloseDropdown();renderLst();
  };
  actions.appendChild(allBtn);actions.appendChild(applyBtn);
  dd.appendChild(actions);
  btn.closest('th').appendChild(dd);
  lstOpenDropdown=dd;
  setTimeout(()=>document.addEventListener('click',function handler(e){
    if(!dd.contains(e.target)){lstCloseDropdown();document.removeEventListener('click',handler);}
  }),0);
}

function renderLst(){
  const wrap=document.getElementById('lst-view');
  // Only build toolbar once
  if(!document.getElementById('lst-tbody')){
    wrap.innerHTML='';
    const lw=document.createElement('div');lw.className='lst-wrap';
    const tb=document.createElement('div');tb.className='lst-toolbar';
    const search=document.createElement('input');
    search.className='lst-search';search.type='text';search.id='lst-search-input';
    search.placeholder='Search person, project...';search.value=lstSearch;
    search.oninput=function(){lstSearch=this.value;lstRenderTable();};
    tb.appendChild(search);
    const expBtn=document.createElement('button');expBtn.className='btn';expBtn.textContent='⬇ Export CSV';expBtn.onclick=lstExportCSV;
    tb.appendChild(expBtn);
    const count=document.createElement('span');count.className='lst-count';count.id='lst-count';
    tb.appendChild(count);
    lw.appendChild(tb);
    const tw=document.createElement('div');tw.className='lst-table-wrap';
    const tbl=document.createElement('table');tbl.className='lst-table';tbl.id='lst-tbl';
    const thead=document.createElement('thead');thead.id='lst-thead';
    tbl.appendChild(thead);
    const tbody=document.createElement('tbody');tbody.id='lst-tbody';
    tbl.appendChild(tbody);
    tw.appendChild(tbl);lw.appendChild(tw);
    wrap.appendChild(lw);
  }
  lstRenderTable();
}

function lstRenderTable(){
  const allRows=lstGetRows();
  const rows=lstApplyFilters(allRows);
  document.getElementById('lst-count').textContent=rows.length+' entries';

  // Rebuild header
  const thead=document.getElementById('lst-thead');thead.innerHTML='';
  const hr=document.createElement('tr');
  const cols=[
    {key:'person',label:'Person'},
    {key:'team',label:'Team'},
    {key:'label',label:'Project / Notes'},
    {key:'type',label:'Type'},
    {key:'start',label:'Start Date'},
    {key:'end',label:'End Date'},
    {key:'cal',label:'Calendar'},
  ];
  cols.forEach(col=>{
    const th=document.createElement('th');
    const inner=document.createElement('div');inner.className='lst-th-inner';
    const lbl=document.createElement('span');lbl.textContent=col.label;
    const sortIco=document.createElement('span');sortIco.className='lst-sort-btn';
    if(lstSortCol===col.key) sortIco.textContent=lstSortDir==='asc'?'↑':'↓';
    inner.onclick=()=>{
      if(lstSortCol===col.key) lstSortDir=lstSortDir==='asc'?'desc':'asc';
      else{lstSortCol=col.key;lstSortDir='asc';}
      lstRenderTable();
    };
    inner.appendChild(lbl);inner.appendChild(sortIco);
    const filterBtn=document.createElement('button');filterBtn.className='lst-filter-btn';
    filterBtn.textContent='▾';
    if(lstColFilters[col.key]) filterBtn.classList.add('active');
    filterBtn.onclick=e=>{e.stopPropagation();lstOpenFilter(col.key,filterBtn,allRows);};
    th.appendChild(inner);th.appendChild(filterBtn);
    hr.appendChild(th);
  });
  thead.appendChild(hr);

  // Rebuild body
  const tbody=document.getElementById('lst-tbody');tbody.innerHTML='';
  rows.forEach(e=>{
    const tr=document.createElement('tr');
    const c=personColor(e.person,e.type);
    [
      {html:`<span class="lst-dot" style="background:${c.border}"></span>${e.person||'—'}`},
      {text:LST_TEAM_LABEL[e.team]||e.team||'—'},
      {text:e.label||e.fulltitle||'—'},
      {html:`<span class="lst-badge" style="background:${LST_TYPE_BG[e.type]||'#f0f0f0'}">${LST_TYPE_LABEL[e.type]||e.type||'—'}</span>`},
      {text:e.start||'—'},
      {text:e.end||'—'},
      {text:e.cal||'—'},
    ].forEach(cell=>{
      const td=document.createElement('td');
      if(cell.html) td.innerHTML=cell.html;
      else td.textContent=cell.text;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function lstExportCSV(){
  const allRows=lstGetRows();
  const rows=lstApplyFilters(allRows);
  const headers=['Person','Team','Project / Notes','Type','Start Date','End Date','Calendar'];
  const data=[headers,...rows.map(e=>[
    e.person||'',
    LST_TEAM_LABEL[e.team]||e.team||'',
    e.label||e.fulltitle||'',
    LST_TYPE_LABEL[e.type]||e.type||'',
    e.start||'',e.end||'',e.cal||'',
  ])];
  const csv=data.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='operations-calendar-'+new Date().toISOString().substring(0,10)+'.csv';
  a.click();
}

loadData();
