<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Cove Project Calendar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,sans-serif;background:#f3f2f1;color:#323130;font-size:13px}
.app{max-width:1400px;margin:0 auto;padding:12px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;background:#fff;padding:10px 14px;border-radius:6px;border:1px solid #e1dfdd}
.toolbar h1{font-size:16px;font-weight:600;color:#323130;margin-right:auto}
.btn{padding:4px 12px;border:1px solid #8a8886;background:#fff;border-radius:3px;cursor:pointer;font-size:12px;color:#323130}
.btn:hover{background:#f3f2f1}
.btn.active{background:#0078d4;color:#fff;border-color:#0078d4}
.btn.nav{padding:4px 8px}
.sep{width:1px;height:20px;background:#e1dfdd}
.legend{display:flex;gap:8px;flex-wrap:wrap;background:#fff;padding:8px 14px;border-radius:6px;border:1px solid #e1dfdd;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#605e5c}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cal-wrap{background:#fff;border-radius:6px;border:1px solid #e1dfdd;overflow:hidden}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #e1dfdd}
.dow-cell{text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:#605e5c;text-transform:uppercase;letter-spacing:.04em}
.week{border-bottom:1px solid #e1dfdd}
.week:last-child{border-bottom:none}
.day-nums{display:grid;grid-template-columns:repeat(7,1fr)}
.dn{padding:3px 5px;font-size:11px;color:#605e5c;border-right:1px solid #e1dfdd;min-height:20px}
.dn:last-child{border-right:none}
.dn.today{color:#0078d4;font-weight:700}
.dn.other{color:#c8c6c4}
.dn.wknd{background:#faf9f8}
.entries-grid{display:grid;grid-template-columns:repeat(7,1fr);position:relative}
.day-col{border-right:1px solid #e1dfdd;min-height:24px}
.day-col:last-child{border-right:none}
.day-col.wknd{background:#faf9f8}
.day-col.today-col{background:#eff6fc}
.day-col.other-col{background:#faf9f8}
.spans{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;gap:1px;padding:2px 0;pointer-events:none}
.span-row{display:grid;grid-template-columns:repeat(7,1fr);height:18px}
.bar{height:16px;border-radius:2px;font-size:10px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 5px;line-height:16px;cursor:pointer;pointer-events:all;margin:0 1px;border-left:3px solid transparent}
.bar:hover{opacity:.85}
.tooltip{position:fixed;background:#fff;border:1px solid #e1dfdd;border-radius:4px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:999;display:none;box-shadow:0 2px 8px rgba(0,0,0,.12);max-width:240px;line-height:1.6}
.tt-name{font-weight:600;margin-bottom:2px}
.tt-proj{color:#323130}
.tt-dates{color:#605e5c;font-size:11px;margin-top:2px}
.tt-type{display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px;margin-top:3px}
.month-lbl{font-size:15px;font-weight:600;min-width:140px}
.view-toggle{display:flex;gap:0}
.view-toggle .btn{border-radius:0}
.view-toggle .btn:first-child{border-radius:3px 0 0 3px}
.view-toggle .btn:last-child{border-radius:0 3px 3px 0}
.gantt-wrap{background:#fff;border-radius:6px;border:1px solid #e1dfdd;overflow-x:auto}
.gantt-table{width:100%;border-collapse:collapse;min-width:900px}
.gantt-table th{font-size:10px;font-weight:600;color:#605e5c;text-align:center;padding:4px 2px;border-bottom:1px solid #e1dfdd;border-right:1px solid #e1dfdd;text-transform:uppercase}
.gantt-table td{border-bottom:1px solid #e1dfdd;border-right:1px solid #e1dfdd;padding:1px 2px;vertical-align:middle}
.gantt-table td.name-col{padding:3px 8px;font-size:11px;font-weight:500;white-space:nowrap;min-width:100px}
.gantt-table td.day-td{width:28px;min-width:28px;height:22px;text-align:center}
.gantt-table td.wknd-td{background:#faf9f8}
.gantt-table td.today-td{background:#eff6fc}
.gantt-bar-g{display:block;width:100%;height:16px;border-radius:2px;font-size:9px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 3px;line-height:16px;cursor:pointer}
.group-hdr td{background:#f3f2f1;font-size:10px;font-weight:600;color:#605e5c;padding:3px 8px;text-transform:uppercase;letter-spacing:.05em}
.summary-bar{display:flex;gap:12px;background:#fff;padding:8px 14px;border-radius:6px;border:1px solid #e1dfdd;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.sum-item{font-size:12px;color:#605e5c}
.sum-item strong{color:#323130;font-weight:600}
.loading{text-align:center;padding:40px;color:#605e5c;font-size:14px}
.error{text-align:center;padding:40px;color:#c00000;font-size:13px}
.last-sync{font-size:11px;color:#605e5c;margin-left:auto}
</style>
</head>
<body>
<div class="app">
<div class="toolbar">
  <h1>Pine Cove — Project Calendar</h1>
  <div class="view-toggle">
    <button class="btn active" id="btn-cal" onclick="setView('cal')">Wall Calendar</button>
    <button class="btn" id="btn-gantt" onclick="setView('gantt')">Resource View</button>
  </div>
  <div class="sep"></div>
  <button class="btn active" onclick="setFilter('all')" id="f-all">All</button>
  <button class="btn" onclick="setFilter('geek')" id="f-geek">Geek</button>
  <button class="btn" onclick="setFilter('green')" id="f-green">Green</button>
  <button class="btn" onclick="setFilter('panda')" id="f-panda">Panda</button>
  <div class="sep"></div>
  <button class="btn nav" onclick="shift(-1)">&#8592;</button>
  <span class="month-lbl" id="month-lbl"></span>
  <button class="btn nav" onclick="shift(1)">&#8594;</button>
  <button class="btn" onclick="goToday()">Today</button>
  <div class="sep"></div>
  <button class="btn" onclick="loadData()">&#8635; Refresh</button>
  <span class="last-sync" id="last-sync"></span>
</div>

<div class="summary-bar" id="summary-bar"><span style="color:#605e5c;font-size:12px">Loading...</span></div>
<div class="legend" id="legend"></div>
<div id="cal-view"><div class="loading">Loading calendar data...</div></div>
<div id="gantt-view" style="display:none"></div>
</div>
<div class="tooltip" id="tt"></div>

<script>
const SHAREPOINT_SITE = 'https://pineccllc.sharepoint.com/sites/service';
const LIST_NAME = 'TeamCalendarEvents';

const PEOPLE = {
  'David':      {bg:'#c7e0c7',border:'#3B6D11',text:'#1e3d09',team:'both'},
  'Mike':       {bg:'#b3d4f0',border:'#0078d4',text:'#004578',team:'green'},
  'Jordan':     {bg:'#ffe4a3',border:'#d47500',text:'#7a3d00',team:'green'},
  'Jaxn':       {bg:'#fff3a3',border:'#b8a000',text:'#5a4800',team:'green'},
  'Derrick':    {bg:'#f0b3b3',border:'#c00000',text:'#600000',team:'geek'},
  'Ronda':      {bg:'#e0c7f0',border:'#7030a0',text:'#3d1060',team:'geek'},
  'Ron':        {bg:'#e8c870',border:'#9a7200',text:'#4a3200',team:'green'},
  'Owen':       {bg:'#f5f0c0',border:'#a09000',text:'#504000',team:'geek'},
  'Todd':       {bg:'#f7c8e0',border:'#c0006a',text:'#600030',team:'green'},
  'Contractor': {bg:'#b0b0b0',border:'#505050',text:'#202020',team:'both'},
  'TBD':        {bg:'#c8a870',border:'#7a5a10',text:'#3a2000',team:'both'},
};
const DEFAULT_P = {bg:'#d0d0d0',border:'#808080',text:'#303030',team:'both'};
const TBD_COLOR = {bg:'#c8a870',border:'#7a5a10',text:'#3a2000'};

let RAW = [];
let curY, curM, activeFilter='all', activeView='cal';
const today = new Date();
curY = today.getFullYear();
curM = today.getMonth();

async function loadData(){
  document.getElementById('last-sync').textContent = 'Refreshing...';
  try {
    const url = `${SHAREPOINT_SITE}/_api/web/lists/getbytitle('${LIST_NAME}')/items?$select=Title,Person,Customer,ProjectName,EntryType,StartDate,EndDate,Calendar&$top=5000`;
    const res = await fetch(url, {
      headers: { 'Accept': 'application/json;odata=verbose' }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    RAW = data.d.results.map(item => ({
      person:  (item.Person||'').trim(),
      label:   (item.Title||'').trim(),
      type:    (item.EntryType||'project').toLowerCase().trim(),
      start:   (item.StartDate||'').substring(0,10),
      end:     (item.EndDate||'').substring(0,10),
      cal:     (item.Calendar||'').toLowerCase().trim(),
    })).filter(e => e.start && e.end);
    const now = new Date();
    document.getElementById('last-sync').textContent = 'Last synced: '+now.toLocaleTimeString();
    render();
  } catch(err) {
    document.getElementById('last-sync').textContent = 'Sync failed';
    document.getElementById('cal-view').innerHTML = `<div class="error">Could not load calendar data.<br>Make sure this page is hosted on your SharePoint site.<br><small>${err.message}</small></div>`;
  }
}

function personColor(name, type){
  if(type==='tbd'||name==='TBD') return TBD_COLOR;
  return PEOPLE[name]||DEFAULT_P;
}

function setFilter(f){
  activeFilter=f;
  ['all','geek','green','panda'].forEach(x=>{
    document.getElementById('f-'+x).classList.toggle('active',x===f);
  });
  render();
}
function setView(v){
  activeView=v;
  document.getElementById('btn-cal').classList.toggle('active',v==='cal');
  document.getElementById('btn-gantt').classList.toggle('active',v==='gantt');
  document.getElementById('cal-view').style.display=v==='cal'?'':'none';
  document.getElementById('gantt-view').style.display=v==='gantt'?'':'none';
  render();
}
function shift(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}render();}
function goToday(){curY=today.getFullYear();curM=today.getMonth();render();}

function filteredEntries(){
  return RAW.filter(e => activeFilter==='all'||e.cal===activeFilter);
}

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function renderSummary(entries){
  const bar=document.getElementById('summary-bar');
  const people=new Set(entries.map(e=>e.person).filter(p=>p&&p!=='TBD'));
  const projects=new Set(entries.map(e=>e.label));
  const tbds=entries.filter(e=>e.person==='TBD'||e.type==='tbd').length;
  bar.innerHTML=`
    <div class="sum-item">People scheduled: <strong>${people.size}</strong></div>
    <div class="sum-item">Active projects: <strong>${projects.size}</strong></div>
    ${tbds>0?`<div class="sum-item" style="color:#7a5a10">TBD slots: <strong>${tbds}</strong> — need staffing</div>`:''}
  `;
}

function renderLegend(){
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  Object.entries(PEOPLE).forEach(([name,p])=>{
    if(name==='TBD') return;
    if(activeFilter!=='all'&&p.team!==activeFilter&&p.team!=='both') return;
    const d=document.createElement('div');d.className='leg';
    d.innerHTML=`<span class="leg-dot" style="background:${p.border}"></span>${name}`;
    leg.appendChild(d);
  });
  const tbd=document.createElement('div');tbd.className='leg';
  tbd.innerHTML=`<span class="leg-dot" style="background:#7a5a10"></span>TBD — unstaffed`;
  leg.appendChild(tbd);
}

function renderCal(){
  const entries=filteredEntries();
  renderSummary(entries);
  renderLegend();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month-lbl').textContent=months[curM]+' '+curY;
  const wrap=document.getElementById('cal-view');
  wrap.innerHTML='';
  const cw=document.createElement('div');cw.className='cal-wrap';

  const dowHdr=document.createElement('div');dowHdr.className='dow-hdr';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{
    const c=document.createElement('div');c.className='dow-cell';c.textContent=d;dowHdr.appendChild(c);
  });
  cw.appendChild(dowHdr);

  const first=new Date(curY,curM,1);
  let ws=new Date(first);ws.setDate(ws.getDate()-ws.getDay());

  while(true){
    if(ws.getFullYear()>curY||(ws.getFullYear()===curY&&ws.getMonth()>curM&&ws.getDay()===0)) break;
    const days=[];
    for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
    if(days[0].getMonth()>curM&&days[0].getFullYear()>=curY) break;

    const week=document.createElement('div');week.className='week';
    const dnRow=document.createElement('div');dnRow.className='day-nums';
    days.forEach(d=>{
      const c=document.createElement('div');c.className='dn';
      if(d.getMonth()!==curM)c.classList.add('other');
      else if(dk(d)===dk(today))c.classList.add('today');
      if(d.getDay()===0||d.getDay()===6)c.classList.add('wknd');
      c.textContent=d.getDate();
      dnRow.appendChild(c);
    });
    week.appendChild(dnRow);

    const eg=document.createElement('div');eg.className='entries-grid';
    days.forEach(d=>{
      const col=document.createElement('div');col.className='day-col';
      if(dk(d)===dk(today))col.classList.add('today-col');
      else if(d.getDay()===0||d.getDay()===6)col.classList.add('wknd');
      else if(d.getMonth()!==curM)col.classList.add('other-col');
      eg.appendChild(col);
    });

    const weekEntries=entries.filter(e=>{
      if(!e.start||!e.end) return false;
      return pd(e.start)<=days[6]&&pd(e.end)>=days[0];
    });

    const rows=[];
    weekEntries.forEach(e=>{
      const es=pd(e.start),ee=pd(e.end);
      const startCol=es<days[0]?0:days.findIndex(d=>dk(d)===dk(es));
      const eiIdx=days.findIndex(d=>dk(d)===dk(ee));
      const endCol=ee>days[6]?6:(eiIdx===-1?6:eiIdx);
      if(startCol<0) return;
      let placed=false;
      for(let r=0;r<rows.length;r++){
        if(rows[r].every(x=>x.endCol<startCol||x.startCol>endCol)){
          rows[r].push({e,startCol,endCol});placed=true;break;
        }
      }
      if(!placed)rows.push([{e,startCol,endCol}]);
    });

    const minH=(rows.length*20+6)+'px';
    eg.querySelectorAll('.day-col').forEach(c=>c.style.minHeight=minH);

    const sl=document.createElement('div');sl.className='spans';
    rows.forEach(row=>{
      const sr=document.createElement('div');sr.className='span-row';
      const sorted=[...row].sort((a,b)=>a.startCol-b.startCol);
      let col=0;
      sorted.forEach(({e,startCol,endCol})=>{
        while(col<startCol){const emp=document.createElement('div');sr.appendChild(emp);col++;}
        const span=endCol-startCol+1;
        const c=personColor(e.person,e.type);
        const bar=document.createElement('div');
        bar.className='bar';
        bar.style.cssText=`background:${c.bg};border-left-color:${c.border};color:${c.text};grid-column:${startCol+1}/span ${span}`;
        bar.textContent=e.person+(e.label?' — '+e.label:'');
        bar.addEventListener('mouseenter',ev=>showTt(ev,e));
        bar.addEventListener('mouseleave',()=>{document.getElementById('tt').style.display='none';});
        sr.appendChild(bar);
        col=endCol+1;
      });
      sl.appendChild(sr);
    });
    eg.appendChild(sl);
    week.appendChild(eg);
    cw.appendChild(week);
    ws.setDate(ws.getDate()+7);
  }
  wrap.appendChild(cw);
}

function renderGantt(){
  const entries=filteredEntries();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month-lbl').textContent=months[curM]+' '+curY;
  const daysInMonth=new Date(curY,curM+1,0).getDate();
  const days=[];
  for(let i=1;i<=daysInMonth;i++) days.push(new Date(curY,curM,i));

  const seenPeople=new Set(RAW.map(e=>e.person).filter(p=>p&&p!=='TBD'));
  const people=Object.keys(PEOPLE).filter(name=>{
    if(name==='TBD') return false;
    const p=PEOPLE[name];
    if(activeFilter==='all') return seenPeople.has(name)||true;
    return p.team===activeFilter||p.team==='both';
  });

  const wrap=document.getElementById('gantt-view');
  wrap.innerHTML='';
  const gw=document.createElement('div');gw.className='gantt-wrap';
  const tbl=document.createElement('table');tbl.className='gantt-table';

  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  const nth=document.createElement('th');nth.textContent='Person';nth.style.textAlign='left';nth.style.minWidth='100px';hr.appendChild(nth);
  days.forEach(d=>{
    const th=document.createElement('th');
    th.textContent=d.getDate();
    if(dk(d)===dk(today))th.style.color='#0078d4';
    if(d.getDay()===0||d.getDay()===6)th.style.opacity='0.4';
    hr.appendChild(th);
  });
  thead.appendChild(hr);tbl.appendChild(thead);

  const tbody=document.createElement('tbody');
  const teams={geek:'Geek team — physical security',green:'Green team — infrastructure',panda:'Panda — service desk'};

  Object.entries(teams).forEach(([teamKey,teamLabel])=>{
    if(activeFilter!=='all'&&activeFilter!==teamKey) return;
    const teamPeople=people.filter(n=>{
      const p=PEOPLE[n];
      return p&&(p.team===teamKey||p.team==='both');
    });
    if(!teamPeople.length) return;

    const ghdr=document.createElement('tr');ghdr.className='group-hdr';
    const gtd=document.createElement('td');gtd.colSpan=daysInMonth+1;gtd.textContent=teamLabel;
    ghdr.appendChild(gtd);tbody.appendChild(ghdr);

    teamPeople.forEach(name=>{
      const tr=document.createElement('tr');
      const ntd=document.createElement('td');ntd.className='name-col';
      const p=PEOPLE[name]||DEFAULT_P;
      ntd.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.border};margin-right:5px"></span>${name}`;
      tr.appendChild(ntd);

      days.forEach(d=>{
        const td=document.createElement('td');td.className='day-td';
        if(dk(d)===dk(today))td.classList.add('today-td');
        else if(d.getDay()===0||d.getDay()===6)td.classList.add('wknd-td');

        const dayEntries=entries.filter(e=>{
          if(!e.start||!e.end) return false;
          return e.person===name&&d>=pd(e.start)&&d<=pd(e.end);
        });

        if(dayEntries.length){
          const e=dayEntries[0];
          const c=personColor(e.person,e.type);
          const bar=document.createElement('div');
          bar.className='gantt-bar-g';
          bar.style.cssText=`background:${c.bg};color:${c.text};border-left:2px solid ${c.border}`;
          bar.title=e.person+' — '+e.label;
          bar.addEventListener('mouseenter',ev=>showTt(ev,e));
          bar.addEventListener('mouseleave',()=>{document.getElementById('tt').style.display='none';});
          td.appendChild(bar);
          if(dayEntries.length>1) td.style.outline='2px solid #c00000';
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  });

  tbl.appendChild(tbody);gw.appendChild(tbl);wrap.appendChild(gw);
}

function showTt(ev,e){
  const tt=document.getElementById('tt');
  tt.style.display='block';
  const typeLabel={project:'Project',travel:'Travel day',off:'Off / PTO',remote:'Remote',tbd:'TBD — needs staffing'};
  const c=personColor(e.person,e.type);
  tt.innerHTML=`
    <div class="tt-name" style="color:${c.border}">${e.person||'Unknown'}</div>
    <div class="tt-proj">${e.label||''}</div>
    <div class="tt-dates">${e.start} → ${e.end}</div>
    <span class="tt-type" style="background:${c.bg};color:${c.text}">${typeLabel[e.type]||e.type}</span>
  `;
  tt.style.left=(ev.clientX+14)+'px';
  tt.style.top=(ev.clientY-10)+'px';
}

function render(){
  if(activeView==='cal') renderCal();
  else renderGantt();
}

loadData();
</script>
</body>
</html>
