<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Teams Calendars</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pc-dark:#2d5a2d;--pc-mid:#3d7a3d;--pc-light:#e8f2e8;--pc-sage:#8fba6a;--pc-border:#d0e4d0;--pc-text:#1a3a1a}
body{font-family:Segoe UI,sans-serif;background:#f0f4f0;color:#1a3a1a;font-size:13px}
.app{max-width:1400px;margin:0 auto;padding:0}
.header{background:var(--pc-dark);padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.header-logo{display:flex;align-items:center;gap:10px;margin-right:auto}
.logo-mark{display:flex;align-items:baseline;gap:0;font-size:22px;font-weight:700;line-height:1}
.logo-pine{color:#fff;letter-spacing:-0.5px}
.logo-dot{color:var(--pc-sage);margin:0 2px}
.logo-cove{color:var(--pc-sage);letter-spacing:-0.5px}
.logo-sub{color:rgba(255,255,255,0.6);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;display:block;margin-top:1px}
.header-title{color:rgba(255,255,255,0.85);font-size:13px;font-weight:400;border-left:1px solid rgba(255,255,255,0.2);padding-left:12px}
.toolbar{display:flex;align-items:center;gap:8px;margin:0 10px 10px;flex-wrap:wrap}
.btn{padding:4px 12px;border:1px solid var(--pc-border);background:#fff;border-radius:3px;cursor:pointer;font-size:12px;color:var(--pc-text)}
.btn:hover{background:var(--pc-light)}
.btn.active{background:var(--pc-dark);color:#fff;border-color:var(--pc-dark)}
.btn.nav{padding:4px 8px}
.sep{width:1px;height:20px;background:var(--pc-border)}
.legend{display:flex;gap:8px;flex-wrap:wrap;background:#fff;padding:8px 14px;border-radius:4px;border:1px solid var(--pc-border);margin:0 10px 10px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#4a6a4a}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cal-wrap{background:#fff;border-radius:4px;border:1px solid var(--pc-border);overflow:hidden;margin:0 10px}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--pc-border);background:var(--pc-light)}
.dow-cell{text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:var(--pc-dark);text-transform:uppercase;letter-spacing:.04em}
.week{border-bottom:1px solid var(--pc-border)}
.week:last-child{border-bottom:none}
.day-nums{display:grid;grid-template-columns:repeat(7,1fr)}
.dn{padding:3px 5px;font-size:11px;color:#4a6a4a;border-right:1px solid var(--pc-border);min-height:20px}
.dn:last-child{border-right:none}
.dn.today{color:var(--pc-dark);font-weight:700}
.dn.other{color:#a0b8a0}
.dn.wknd{background:#f5f8f5}
.entries-grid{display:grid;grid-template-columns:repeat(7,1fr);position:relative}
.day-col{border-right:1px solid var(--pc-border);min-height:24px}
.day-col:last-child{border-right:none}
.day-col.wknd{background:#f5f8f5}
.day-col.today-col{background:#e8f5e8}
.day-col.other-col{background:#f5f8f5}
.spans{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;gap:1px;padding:2px 0;pointer-events:none}
.span-row{display:grid;grid-template-columns:repeat(7,1fr);height:18px}
.bar{height:16px;border-radius:2px;font-size:10px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 5px;line-height:16px;cursor:pointer;pointer-events:all;margin:0 1px;border-left:3px solid transparent}
.bar:hover{opacity:.85}
.tooltip{position:fixed;background:#fff;border:1px solid var(--pc-border);border-radius:4px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:999;display:none;box-shadow:0 2px 8px rgba(0,0,0,.12);max-width:240px;line-height:1.6}
.tt-name{font-weight:600;margin-bottom:2px}
.month-lbl{font-size:15px;font-weight:600;min-width:140px;text-align:center;color:var(--pc-dark)}
.view-toggle{display:flex}
.view-toggle .btn:first-child{border-radius:3px 0 0 3px;border-right:none}
.view-toggle .btn:last-child{border-radius:0 3px 3px 0}
.gantt-wrap{background:#fff;border-radius:4px;border:1px solid var(--pc-border);overflow-x:auto;margin:0 10px}
.gantt-table{width:100%;border-collapse:collapse;min-width:900px}
.gantt-table th{font-size:10px;font-weight:600;color:var(--pc-dark);text-align:center;padding:4px 2px;border-bottom:1px solid var(--pc-border);border-right:1px solid var(--pc-border);text-transform:uppercase;background:var(--pc-light)}
.gantt-table th:first-child{text-align:left;padding-left:8px}
.gantt-table td{border-bottom:1px solid var(--pc-border);border-right:1px solid var(--pc-border);padding:1px 2px;vertical-align:middle}
.gantt-table td.name-col{padding:3px 8px;font-size:11px;font-weight:500;white-space:nowrap;min-width:100px}
.gantt-table td.day-td{width:28px;min-width:28px;height:22px;text-align:center}
.gantt-table td.wknd-td{background:#f5f8f5}
.gantt-table td.today-td{background:#e8f5e8}
.gantt-bar-g{display:block;width:100%;height:16px;border-radius:2px;font-size:9px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 3px;line-height:16px;cursor:pointer}
.group-hdr td{background:var(--pc-dark);color:#fff;font-size:10px;font-weight:600;padding:4px 8px;text-transform:uppercase;letter-spacing:.06em}
.summary-bar{display:flex;gap:12px;background:#fff;padding:8px 14px;border-radius:4px;border:1px solid var(--pc-border);margin:0 10px 10px;flex-wrap:wrap;align-items:center}
.sum-item{font-size:12px;color:#4a6a4a}
.sum-item strong{color:var(--pc-dark);font-weight:600}
.last-sync{font-size:11px;color:#4a6a4a;margin-left:auto}
.error{text-align:center;padding:40px;color:#c00000;font-size:13px}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <span style="color:#8fba6a;font-size:18px;font-weight:600;letter-spacing:0.02em">Operations Teams Calendars</span>
</div>
<div class="toolbar">
  <div class="view-toggle">
    <button class="btn active" id="btn-cal" onclick="setView('cal')">Wall Calendar</button>
    <button class="btn" id="btn-gantt" onclick="setView('gantt')">Resource View</button>
  </div>
  <div class="sep"></div>
  <button class="btn active" id="f-all" onclick="setFilter('all')">All</button>
  <button class="btn" id="f-geek" onclick="setFilter('geek')">Geek</button>
  <button class="btn" id="f-green" onclick="setFilter('green')">Green</button>
  <button class="btn" id="f-panda" onclick="setFilter('panda')">Panda</button>
  <div class="sep"></div>
  <button class="btn nav" onclick="shift(-1)">&#8592;</button>
  <span class="month-lbl" id="month-lbl"></span>
  <button class="btn nav" onclick="shift(1)">&#8594;</button>
  <button class="btn" onclick="goToday()">Today</button>
  <div class="sep"></div>
  <button class="btn" onclick="loadData()">&#8635; Refresh</button>
  <span class="last-sync" id="last-sync"></span>
</div>
<div class="summary-bar" id="summary-bar"><span style="color:#605e5c;font-size:12px">Loading...</span></div>
<div class="legend" id="legend"></div>
<div id="cal-view"></div>
<div id="gantt-view" style="display:none"></div>
</div>
<div class="tooltip" id="tt"></div>

<script>
const DATA_URL='https://dhuebner-pcc.github.io/operation-teams-calendar/calendar-data.json';

const PEOPLE={
  'David':      {bg:'#c7e0c7',border:'#3B6D11',text:'#1e3d09',team:'management'},
  'Ronda':      {bg:'#e0c7f0',border:'#7030a0',text:'#3d1060',team:'geek'},
  'Todd':       {bg:'#f7c8e0',border:'#c0006a',text:'#600030',team:'geek'},
  'Ron':        {bg:'#e8c870',border:'#9a7200',text:'#4a3200',team:'geek'},
  'Owen':       {bg:'#f5f0c0',border:'#a09000',text:'#504000',team:'geek'},
  'Derrick':    {bg:'#f0b3b3',border:'#c00000',text:'#600000',team:'green'},
  'Jordan':     {bg:'#ffe4a3',border:'#d47500',text:'#7a3d00',team:'green'},
  'Jaxn':       {bg:'#fff3a3',border:'#b8a000',text:'#5a4800',team:'green'},
  'Mike':       {bg:'#b3d4f0',border:'#0078d4',text:'#004578',team:'green'},
  'Marion':     {bg:'#c7e8f0',border:'#0078a0',text:'#003a50',team:'panda'},
  'Kacey':      {bg:'#f0e0c7',border:'#a06030',text:'#503010',team:'panda'},
  'Chase':      {bg:'#c7f0e0',border:'#009060',text:'#004030',team:'panda'},
  'Zac':        {bg:'#f0c7e8',border:'#a03080',text:'#501040',team:'panda'},
  'Curtis':     {bg:'#c7c7f0',border:'#3030a0',text:'#101050',team:'panda'},
  'Morgan':     {bg:'#f0f0c7',border:'#808000',text:'#404000',team:'panda'},
  'Baldacci':   {bg:'#e8c7c7',border:'#903030',text:'#401010',team:'panda'},
  'Contractor': {bg:'#b0b0b0',border:'#505050',text:'#202020',team:'other'},
};

const CORE_TEAMS={
  management: ['David'],
  geek:       ['Ronda','Todd','Ron','Owen'],
  green:      ['Derrick','Jordan','Jaxn','Mike'],
  panda:      ['Marion','Kacey','Chase','Zac','Curtis','Morgan','Baldacci'],
  needstaff:  ['TBD','TBD 1','TBD 2','TBD 3','TBD 4','TBD 5','TBD 6'],
  other:      ['Contractor'],
};
const TBD_COLOR={bg:'#c8a870',border:'#7a5a10',text:'#3a2000'};
const DEFAULT_P={bg:'#d0d0d0',border:'#808080',text:'#303030',team:'both'};

let RAW=[];
let curY,curM,activeView='cal';
let activeFilters=new Set(['all']);
const today=new Date();
curY=today.getFullYear();
curM=today.getMonth();

function personColor(name,type){
  if(!name||name.toUpperCase().startsWith('TBD')||type==='tbd') return TBD_COLOR;
  return PEOPLE[name]||DEFAULT_P;
}

function setFilter(f){
  if(f==='all'){
    activeFilters=new Set(['all']);
  } else {
    activeFilters.delete('all');
    if(activeFilters.has(f)) activeFilters.delete(f);
    else activeFilters.add(f);
    if(activeFilters.size===0) activeFilters=new Set(['all']);
  }
  document.getElementById('f-all').classList.toggle('active',activeFilters.has('all'));
  document.getElementById('f-geek').classList.toggle('active',activeFilters.has('geek'));
  document.getElementById('f-green').classList.toggle('active',activeFilters.has('green'));
  document.getElementById('f-panda').classList.toggle('active',activeFilters.has('panda'));
  render();
}

function setView(v){
  activeView=v;
  document.getElementById('btn-cal').classList.toggle('active',v==='cal');
  document.getElementById('btn-gantt').classList.toggle('active',v==='gantt');
  document.getElementById('cal-view').style.display=v==='cal'?'':'none';
  document.getElementById('gantt-view').style.display=v==='gantt'?'':'none';
  render();
}

function shift(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}render();}
function goToday(){curY=today.getFullYear();curM=today.getMonth();render();}

function filteredEntries(){
  if(activeFilters.has('all')) return RAW;
  return RAW.filter(e=>activeFilters.has(e.cal));
}

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

async function loadData(){
  document.getElementById('last-sync').textContent='Refreshing...';
  try{
    const res=await fetch(DATA_URL+'?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    RAW=data.map(item=>{
      const title=(item.Title||'').trim();
      const parts=title.split(' - ');
      const person=parts[0].trim();
      const entryType=item.EntryType;
      const calendar=item.Calendar;
      const type=(typeof entryType==='object'?entryType&&entryType.Value:entryType||'project').toLowerCase().trim();
      const cal=(typeof calendar==='object'?calendar&&calendar.Value:calendar||'').toLowerCase().trim();
      const parts2=title.split(' - ');
      const displayLabel=parts2.length>1?parts2.slice(1).join(' - '):title;
      return{
        person,
        label:displayLabel,
        fulltitle:title,
        type,
        start:(item.StartDate||'').substring(0,10),
        end:(item.EndDate||'').substring(0,10),
        cal,
      };
    }).filter(e=>e.start&&e.end);
    const now=new Date();
    document.getElementById('last-sync').textContent='Last synced: '+now.toLocaleTimeString();
    render();
  } catch(err){
    document.getElementById('last-sync').textContent='Sync failed';
    document.getElementById('cal-view').innerHTML='<div class="error">Error: '+err.message+'</div>';
  }
}

function renderSummary(entries){
  const bar=document.getElementById('summary-bar');
  const people=new Set(entries.map(e=>e.person).filter(p=>p&&!p.toUpperCase().startsWith('TBD')));
  const projects=new Set(entries.map(e=>e.fulltitle));
  const tbds=entries.filter(e=>e.person.toUpperCase().startsWith('TBD')).length;
  bar.innerHTML=(tbds>0?'<div class="sum-item" style="color:#7a5a10">TBD slots: <strong>'+tbds+'</strong> — need staffing</div>':'<div class="sum-item">No TBD slots — all positions staffed</div>');
}

function renderLegend(){
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  Object.entries(PEOPLE).forEach(function(entry){
    const name=entry[0],p=entry[1];
    if(!activeFilters.has('all')&&!activeFilters.has(p.team)&&p.team!=='both') return;
    const d=document.createElement('div');d.className='leg';
    d.innerHTML='<span class="leg-dot" style="background:'+p.border+'"></span>'+name;
    leg.appendChild(d);
  });
  const tbd=document.createElement('div');tbd.className='leg';
  tbd.innerHTML='<span class="leg-dot" style="background:#7a5a10"></span>TBD — unstaffed';
  leg.appendChild(tbd);
}

function renderCal(){
  const entries=filteredEntries();
  renderSummary(entries);
  renderLegend();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month-lbl').textContent=months[curM]+' '+curY;
  const wrap=document.getElementById('cal-view');
  wrap.innerHTML='';
  const cw=document.createElement('div');cw.className='cal-wrap';
  const dowHdr=document.createElement('div');dowHdr.className='dow-hdr';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d){
    const c=document.createElement('div');c.className='dow-cell';c.textContent=d;dowHdr.appendChild(c);
  });
  cw.appendChild(dowHdr);

  const first=new Date(curY,curM,1);
  let ws=new Date(first);ws.setDate(ws.getDate()-ws.getDay());

  while(true){
    const days=[];
    for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
    if(days[0].getMonth()>curM&&days[0].getFullYear()>=curY) break;

    const week=document.createElement('div');week.className='week';
    const dnRow=document.createElement('div');dnRow.className='day-nums';
    days.forEach(function(d){
      const c=document.createElement('div');c.className='dn';
      if(d.getMonth()!==curM)c.classList.add('other');
      else if(dk(d)===dk(today))c.classList.add('today');
      if(d.getDay()===0||d.getDay()===6)c.classList.add('wknd');
      c.textContent=d.getDate();
      dnRow.appendChild(c);
    });
    week.appendChild(dnRow);

    const eg=document.createElement('div');eg.className='entries-grid';
    days.forEach(function(d){
      const col=document.createElement('div');col.className='day-col';
      if(dk(d)===dk(today))col.classList.add('today-col');
      else if(d.getDay()===0||d.getDay()===6)col.classList.add('wknd');
      else if(d.getMonth()!==curM)col.classList.add('other-col');
      eg.appendChild(col);
    });

    const weekEntries=entries.filter(function(e){
      if(!e.start||!e.end) return false;
      return pd(e.start)<=days[6]&&pd(e.end)>=days[0];
    });

    const rows=[];
    weekEntries.forEach(function(e){
      const es=pd(e.start),ee=pd(e.end);
      const sc=es<days[0]?0:days.findIndex(function(d){return dk(d)===dk(es);});
      const eiIdx=days.findIndex(function(d){return dk(d)===dk(ee);});
      const startCol=sc<0?0:sc;
      const endCol=ee>days[6]?6:(eiIdx===-1?6:eiIdx);
      let placed=false;
      for(let r=0;r<rows.length;r++){
        if(rows[r].every(function(x){return x.endCol<startCol||x.startCol>endCol;})){
          rows[r].push({e,startCol,endCol});placed=true;break;
        }
      }
      if(!placed)rows.push([{e,startCol,endCol}]);
    });

    const minH=(rows.length*20+6)+'px';
    eg.querySelectorAll('.day-col').forEach(function(c){c.style.minHeight=minH;});

    const sl=document.createElement('div');sl.className='spans';
    rows.forEach(function(row){
      const sr=document.createElement('div');sr.className='span-row';
      const sorted=row.slice().sort(function(a,b){return a.startCol-b.startCol;});
      let col=0;
      sorted.forEach(function(item){
        const e=item.e,startCol=item.startCol,endCol=item.endCol;
        while(col<startCol){const emp=document.createElement('div');sr.appendChild(emp);col++;}
        const span=endCol-startCol+1;
        const c=personColor(e.person,e.type);
        const bar=document.createElement('div');
        bar.className='bar';
        bar.style.cssText='background:'+c.bg+';border-left-color:'+c.border+';color:'+c.text+';grid-column:'+(startCol+1)+'/span '+span;
        bar.textContent=e.person+' \u2014 '+e.label;
        bar.addEventListener('mouseenter',function(ev){showTt(ev,e);});
        bar.addEventListener('mouseleave',function(){document.getElementById('tt').style.display='none';});
        sr.appendChild(bar);
        col=endCol+1;
      });
      sl.appendChild(sr);
    });
    eg.appendChild(sl);
    week.appendChild(eg);
    cw.appendChild(week);
    ws.setDate(ws.getDate()+7);
  }
  wrap.appendChild(cw);
}

function renderGantt(){
  const entries=filteredEntries();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month-lbl').textContent=months[curM]+' '+curY;
  const daysInMonth=new Date(curY,curM+1,0).getDate();
  const days=[];
  for(let i=1;i<=daysInMonth;i++) days.push(new Date(curY,curM,i));

  const monthEntries=entries.filter(function(e){
    if(!e.start||!e.end) return false;
    const es=pd(e.start),ee=pd(e.end);
    return es<=new Date(curY,curM,daysInMonth)&&ee>=new Date(curY,curM,1);
  });

  const teams=[
    {key:'management', label:'Project management'},
    {key:'geek',       label:'Geek team — physical security'},
    {key:'green',      label:'Green team — infrastructure'},
    {key:'panda',      label:'Panda — service desk'},
    {key:'needstaff',  label:'Need staff — TBD'},
    {key:'other',      label:'Other / temporary'},
  ];

  const dynamicPeople=new Set();
  monthEntries.forEach(function(e){dynamicPeople.add(e.person);});

  const allCorePeople=new Set();
  Object.values(CORE_TEAMS).forEach(function(arr){arr.forEach(function(n){allCorePeople.add(n);});});

  function getTeam(name){
    if(name.toUpperCase().startsWith('TBD')) return 'needstaff';
    for(const[team,members] of Object.entries(CORE_TEAMS)){
      if(members.includes(name)) return team;
    }
    return 'other';
  }

  const wrap=document.getElementById('gantt-view');
  wrap.innerHTML='';
  const gw=document.createElement('div');gw.className='gantt-wrap';
  const tbl=document.createElement('table');tbl.className='gantt-table';
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  const nth=document.createElement('th');nth.textContent='Person';nth.style.textAlign='left';nth.style.minWidth='120px';hr.appendChild(nth);
  days.forEach(function(d){
    const th=document.createElement('th');
    th.textContent=d.getDate();
    if(dk(d)===dk(today))th.style.color='#0078d4';
    if(d.getDay()===0||d.getDay()===6)th.style.opacity='0.4';
    hr.appendChild(th);
  });
  thead.appendChild(hr);tbl.appendChild(thead);

  const tbody=document.createElement('tbody');

  teams.forEach(function(team){
    if(!activeFilters.has('all')&&team.key!=='management'&&team.key!=='supplemental'&&team.key!=='other'&&!activeFilters.has(team.key)) return;

    const corePeople=CORE_TEAMS[team.key]||[];
    const extraPeople=[...dynamicPeople].filter(function(n){
      return getTeam(n)===team.key&&!corePeople.includes(n);
    });
    const teamPeople=[...corePeople,...extraPeople];
    if(!teamPeople.length) return;

    const ghdr=document.createElement('tr');ghdr.className='group-hdr';
    const gtd=document.createElement('td');gtd.colSpan=daysInMonth+1;gtd.textContent=team.label;
    ghdr.appendChild(gtd);tbody.appendChild(ghdr);

    teamPeople.forEach(function(name){
      const tr=document.createElement('tr');
      const ntd=document.createElement('td');ntd.className='name-col';
      const c=personColor(name,'project');
      ntd.innerHTML='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c.border+';margin-right:5px"></span>'+name;
      tr.appendChild(ntd);

      days.forEach(function(d){
        const td=document.createElement('td');td.className='day-td';
        if(dk(d)===dk(today))td.classList.add('today-td');
        else if(d.getDay()===0||d.getDay()===6)td.classList.add('wknd-td');

        const dayEntries=monthEntries.filter(function(e){
          if(!e.start||!e.end) return false;
          return e.person===name&&d>=pd(e.start)&&d<=pd(e.end);
        });

        if(dayEntries.length){
          const e=dayEntries[0];
          const c=personColor(e.person,e.type);
          const bar=document.createElement('div');
          bar.className='gantt-bar-g';
          bar.style.cssText='background:'+c.bg+';color:'+c.text+';border-left:2px solid '+c.border;
          bar.title=e.person+' \u2014 '+e.label;
          bar.addEventListener('mouseenter',function(ev){showTt(ev,e);});
          bar.addEventListener('mouseleave',function(){document.getElementById('tt').style.display='none';});
          td.appendChild(bar);
          if(dayEntries.length>1) td.style.outline='2px solid #c00000';
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  });

  tbl.appendChild(tbody);gw.appendChild(tbl);wrap.appendChild(gw);
}

function showTt(ev,e){
  const tt=document.getElementById('tt');
  tt.style.display='block';
  const typeLabel={project:'Project',travel:'Travel day',off:'Off / PTO',remote:'Remote',tbd:'TBD — needs staffing'};
  const c=personColor(e.person,e.type);
  tt.innerHTML='<div class="tt-name" style="color:'+c.border+'">'+e.person+'</div>'+
    '<div style="color:#323130">'+e.label+'</div>'+
    '<div style="color:#605e5c;font-size:11px;margin-top:2px">'+e.start+' \u2192 '+e.end+'</div>'+
    '<span style="display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px;margin-top:3px;background:'+c.bg+';color:'+c.text+'">'+(typeLabel[e.type]||e.type)+'</span>';
  tt.style.left=(ev.clientX+14)+'px';
  tt.style.top=(ev.clientY-10)+'px';
}

function render(){
  if(activeView==='cal') renderCal();
  else renderGantt();
}

loadData();
</script>
</body>
</html>
